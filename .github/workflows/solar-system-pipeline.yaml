name: Solar system pipeline

on:
    push:
        branches:
          - main
    pull_request:
        branches:
          - feature/**

jobs:
    unit-test:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: install nodejs
              uses: actions/setup-node@v5
              with:
                node-version: 22

            - name: Install dependencies
              run: |
                echo 'Running npm install command for installing dependencies'
                npm install
            
            - name: invoke unit test
              run: npm test
